<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>飲食紀錄本</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">

  <!-- 儲存功能警示 -->
  <div id="storageWarning" class="banner banner--warn" hidden>
    ⚠️ 瀏覽器的本地儲存功能無法使用（可能是無痕模式），資料不會被保存。
  </div>

  <!-- Firebase 登入狀態列 -->
  <div id="authBanner" class="auth-banner" hidden>
    <div class="auth-info" id="authInfo">
      <span class="auth-dot" id="authDot"></span>
      <span id="authLabel">未登入・資料僅存於本裝置</span>
    </div>
    <button id="authBtn" class="auth-btn" type="button">用 Google 登入以跨裝置同步</button>
  </div>

  <!-- 頁頭 -->
  <header class="app-header">
    <div class="title-block">
      <p class="eyebrow">每日飲食 · 卡路里與蛋白質</p>
      <h1>飲食紀錄本</h1>
    </div>
    <div class="controls">
      <label class="ctrl-label">日期
        <input type="date" id="dateInput">
      </label>
      <label class="ctrl-label">每日卡路里目標
        <input type="number" id="goalInput" min="1" step="10" inputmode="decimal">
      </label>
      <button class="btn" id="todayBtn" type="button">回到今天</button>
    </div>
  </header>

  <main class="layout">
    <section class="meals" id="mealsContainer" aria-label="餐點紀錄"></section>
    <aside class="summary" aria-label="個人資料與本日營養">
      <div id="profileContainer"></div>
      <div id="summaryContainer"></div>
    </aside>
  </main>

  <!-- 歷史 & 匯出 -->
  <section class="history-section">
    <button id="historyToggle" class="btn btn--outline" type="button" aria-expanded="false" aria-controls="historyPanel">
      查看歷史紀錄 &amp; 匯出
    </button>
    <div id="historyPanel" hidden>
      <h3 class="section-h3">近 14 天熱量趨勢</h3>
      <div class="chart-wrap" id="chartContainer"><p class="loading-text">載入中…</p></div>

      <h3 class="section-h3">匯出資料</h3>
      <div class="export-bar">
        <button id="exportWeekBtn" class="export-btn" type="button">
          <span class="export-icon">📋</span>
          <span><strong>複製本週摘要</strong><br><small>貼給 AI 詢問飲食建議</small></span>
        </button>
        <button id="exportCSVBtn" class="export-btn" type="button">
          <span class="export-icon">⬇</span>
          <span><strong>下載 CSV</strong><br><small>用 Excel / Numbers 分析</small></span>
        </button>
      </div>

      <h3 class="section-h3">歷史紀錄列表</h3>
      <div id="historyTableContainer"><p class="loading-text">載入中…</p></div>
    </div>
  </section>

  <footer class="app-footer">
    <p>資料儲存於此瀏覽器（localStorage）或登入後同步至 Firebase，不會上傳至其他伺服器。</p>
  </footer>
</div>

<div id="statusMessage" role="status" aria-live="polite"></div>

<!-- Firebase SDK（若不需要跨裝置同步，保留也無妨） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
